set-option -sa terminal-overrides ",xterm*:Tc"
set -g allow-passthrough on
set -g visual-activity off

unbind C-b
set -g prefix C-a
# bind C-Space send-prefix

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# maximize current pane
bind + run "cut -c3- '#{TMUX_CONF}' | sh -s _maximize_pane '#{session_name}' '#D'"

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

bind Enter copy-mode # enter copy mode
set-option -g default-shell $SHELL


# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g status-right '#{battery_status_bg} Batt: #{battery_icon} #{battery_percentage} #{battery_remain} | %a %h-%d %H:%M '
set -g status-right-length '150'

# set vi-mode
set-window-option -g mode-keys vi

# keybindings
bind _ split-window -v -c "#{pane_current_path}"
bind - split-window -h -c "#{pane_current_path}"
bind Tab last-window        # move to last active window
bind BTab switch-client -l  # move to last session

# kill pane without confirmation
bind x kill-pane
bind X kill-window
bind q run-shell 'cur=$(tmux display-message -p "#{window_index}"); tmux list-windows -F "#{window_index}" | sort -rn | while read i; do [ "$i" -gt "$cur" ] && tmux kill-window -t "$i"; done'
bind r source-file ~/dotfiles/tmux.conf \; display "Config reloaded"

# Status bar styling (Catppuccin Mocha)
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g window-status-current-format ' #I:#W '
set -g window-status-current-style 'bg=#89b4fa,fg=#1e1e2e,bold'
set -g window-status-format ' #I:#W '
set -g window-status-style 'bg=#313244,fg=#a6adc8'

set -g mouse on
# set -s set-clipboard off

# TPM (keep at the very end)
run '~/.tmux/plugins/tpm/tpm'
