# Catppuccin Mocha (matches tmux status bar theme)
[mgr]
cwd = { fg = "#94e2d5" }

hovered         = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
preview_hovered = { underline = true }

find_keyword  = { fg = "#f9e2af", bold = true, italic = true, underline = true }
find_position = { fg = "#f5c2e7", bg = "reset", italic = true }

marker_marked  = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_copied  = { fg = "#f9e2af", bg = "#f9e2af" }
marker_cut     = { fg = "#f38ba8", bg = "#f38ba8" }
marker_selected = { fg = "#89b4fa", bg = "#89b4fa" }

tab_active   = { fg = "#1e1e2e", bg = "#89b4fa" }
tab_inactive = { fg = "#cdd6f4", bg = "#313244" }
tab_width    = 1

count_copied   = { fg = "#1e1e2e", bg = "#f9e2af" }
count_cut      = { fg = "#1e1e2e", bg = "#f38ba8" }
count_selected = { fg = "#1e1e2e", bg = "#89b4fa" }

border_symbol = "│"
border_style  = { fg = "#585b70" }

[status]
separator_open  = ""
separator_close = ""

mode_normal = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
mode_select = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
mode_unset  = { fg = "#1e1e2e", bg = "#f38ba8", bold = true }

progress_label  = { fg = "#cdd6f4", bold = true }
progress_normal = { fg = "#89b4fa", bg = "#313244" }
progress_error  = { fg = "#f38ba8", bg = "#313244" }

perm_type  = { fg = "#89b4fa" }
perm_read  = { fg = "#f9e2af" }
perm_write = { fg = "#f38ba8" }
perm_exec  = { fg = "#a6e3a1" }
perm_sep   = { fg = "#585b70" }

[input]
border   = { fg = "#89b4fa" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#89b4fa" }
active   = { fg = "#f5c2e7", bold = true }
inactive = {}

[confirm]
border   = { fg = "#89b4fa" }

[which]
mask       = { bg = "#313244" }
cand       = { fg = "#94e2d5" }
rest       = { fg = "#7f849c" }
desc       = { fg = "#f5c2e7" }
separator  = "  "

[filetype]
rules = [
	# Images
	{ mime = "image/*", fg = "#f5c2e7" },
	# Media
	{ mime = "{audio,video}/*", fg = "#fab387" },
	# Archives
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*}", fg = "#f38ba8" },
	# Documents
	{ mime = "application/pdf", fg = "#a6e3a1" },
	{ mime = "application/epub*", fg = "#a6e3a1" },
	# Code/text
	{ mime = "text/*", fg = "#a6e3a1" },
	{ mime = "application/json", fg = "#f9e2af" },
	# Executables
	{ name = "*.sh", fg = "#a6e3a1", bold = true },
	# Symlinks
	{ is = "link", fg = "#94e2d5", italic = true },
	# Orphan links
	{ is = "orphan", fg = "#f38ba8", italic = true },
	# Directories
	{ name = "*/", fg = "#89b4fa", bold = true },
	# Executables
	{ is = "exec", fg = "#a6e3a1", bold = true },
]
